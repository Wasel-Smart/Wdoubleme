openapi: 3.1.0
info:
  title: Wasel Production Mobility API
  version: 1.0.0
  description: Implementation contract for identity, wallet, trip, package, admin, and analytics flows.
servers:
  - url: https://www.wasel14.online/api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Verification
  - name: Wallet
  - name: Trips
  - name: Packages
  - name: Admin
  - name: Operations
paths:
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Start OTP session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phoneNumber, purpose]
              properties:
                phoneNumber:
                  type: string
                purpose:
                  type: string
                  enum: [login, wallet_transfer, wallet_withdrawal, driver_action, admin_action]
      responses:
        '200':
          description: OTP session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSessionResponse'
  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otpSessionId, code]
              properties:
                otpSessionId:
                  type: string
                  format: uuid
                code:
                  type: string
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  verificationLevel:
                    type: string

  /verification/sanad/start:
    post:
      tags: [Verification]
      summary: Start SANAD verification session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nationalId]
              properties:
                nationalId:
                  type: string
                documentReference:
                  type: string
      responses:
        '200':
          description: SANAD verification started
          content:
            application/json:
              schema:
                type: object
                properties:
                  verificationId:
                    type: string
                    format: uuid
                  status:
                    type: string
                  redirectUrl:
                    type: string
                    format: uri

  /verification/sanad/callback:
    post:
      tags: [Verification]
      summary: Receive SANAD verification callback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [providerReference, userId, verified]
              properties:
                providerReference:
                  type: string
                userId:
                  type: string
                  format: uuid
                verified:
                  type: boolean
                failureReason:
                  type: string
      responses:
        '200':
          description: Callback processed

  /wallet:
    get:
      tags: [Wallet]
      summary: Get current user wallet dashboard
      responses:
        '200':
          description: Wallet summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletSummary'

  /wallet/top-up:
    post:
      tags: [Wallet]
      summary: Add funds to wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethod]
              properties:
                amount:
                  type: number
                  format: double
                paymentMethod:
                  type: string
                  enum: [card_payment, local_gateway, government_api]
                paymentMethodId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Wallet credited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'

  /wallet/withdraw:
    post:
      tags: [Wallet]
      summary: Withdraw funds from wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, paymentMethod, otpSessionId]
              properties:
                amount:
                  type: number
                paymentMethod:
                  type: string
                  enum: [local_gateway, government_api]
                destinationAccount:
                  type: string
                otpSessionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Withdrawal accepted

  /wallet/transfer:
    post:
      tags: [Wallet]
      summary: Transfer wallet funds between users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipientUserId, amount, otpSessionId]
              properties:
                recipientUserId:
                  type: string
                  format: uuid
                amount:
                  type: number
                note:
                  type: string
                otpSessionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Transfer completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  debitTransactionId:
                    type: string
                    format: uuid
                  creditTransactionId:
                    type: string
                    format: uuid

  /wallet/transactions:
    get:
      tags: [Wallet]
      summary: Get wallet transactions
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'

  /trips:
    post:
      tags: [Trips]
      summary: Create driver trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [originCity, destinationCity, departureTime, availableSeats, pricePerSeat]
              properties:
                originCity:
                  type: string
                destinationCity:
                  type: string
                departureTime:
                  type: string
                  format: date-time
                availableSeats:
                  type: integer
                pricePerSeat:
                  type: number
                allowPackages:
                  type: boolean
                packageCapacity:
                  type: integer
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
    get:
      tags: [Trips]
      summary: Search open trips
      parameters:
        - in: query
          name: originCity
          schema:
            type: string
        - in: query
          name: destinationCity
          schema:
            type: string
        - in: query
          name: departureDate
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Trip search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Trip'

  /trips/{tripId}/book:
    post:
      tags: [Trips]
      summary: Book one seat and pay through wallet
      parameters:
        - in: path
          name: tripId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seatNumber]
              properties:
                seatNumber:
                  type: integer
                paymentMethod:
                  type: string
                  enum: [wallet_balance, card_payment, local_gateway, government_api]
      responses:
        '200':
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'

  /trips/{tripId}/status:
    patch:
      tags: [Trips]
      summary: Update trip lifecycle
      parameters:
        - in: path
          name: tripId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripStatus]
              properties:
                tripStatus:
                  type: string
                  enum: [draft, open, booked, in_progress, completed, cancelled]
      responses:
        '200':
          description: Trip status updated

  /packages:
    post:
      tags: [Packages]
      summary: Create package shipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [receiverName, receiverPhone, feeAmount]
              properties:
                receiverId:
                  type: string
                  format: uuid
                receiverName:
                  type: string
                receiverPhone:
                  type: string
                description:
                  type: string
                weightKg:
                  type: number
                feeAmount:
                  type: number
      responses:
        '201':
          description: Package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'

  /packages/{packageId}/assign:
    post:
      tags: [Packages]
      summary: Assign package to trip and debit sender wallet
      parameters:
        - in: path
          name: packageId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId]
              properties:
                tripId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Package assigned

  /packages/{packageId}/deliver:
    post:
      tags: [Packages]
      summary: Confirm package delivery and credit driver earnings
      parameters:
        - in: path
          name: packageId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Package delivered

  /admin/drivers/{driverId}/approve:
    post:
      tags: [Admin]
      summary: Approve driver and upgrade to level 3
      parameters:
        - in: path
          name: driverId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Driver approved

  /admin/users/{userId}/block:
    post:
      tags: [Admin]
      summary: Block suspicious user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: User blocked

  /admin/operations/live:
    get:
      tags: [Operations]
      summary: Live operational control panel feed
      responses:
        '200':
          description: Live operations snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeDrivers:
                    type: integer
                  activeTrips:
                    type: integer
                  passengersTraveling:
                    type: integer
                  packagesMoving:
                    type: integer
                  walletTransactionsToday:
                    type: integer

  /admin/analytics/overview:
    get:
      tags: [Admin]
      summary: Platform analytics overview
      responses:
        '200':
          description: KPI snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  tripsCompleted:
                    type: integer
                  revenueGenerated:
                    type: number
                  routePopularity:
                    type: array
                    items:
                      type: object
                      properties:
                        route:
                          type: string
                        trips:
                          type: integer
                  driverPerformance:
                    type: array
                    items:
                      type: object
                      properties:
                        driverId:
                          type: string
                          format: uuid
                        ratingAverage:
                          type: number
                        completedTrips:
                          type: integer
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OtpSessionResponse:
      type: object
      properties:
        otpSessionId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
    WalletSummary:
      type: object
      properties:
        walletId:
          type: string
          format: uuid
        balance:
          type: number
        pendingBalance:
          type: number
        walletStatus:
          type: string
        currencyCode:
          type: string
    TransactionResponse:
      type: object
      properties:
        transactionId:
          type: string
          format: uuid
        walletId:
          type: string
          format: uuid
        amount:
          type: number
        status:
          type: string
    Transaction:
      type: object
      properties:
        transactionId:
          type: string
          format: uuid
        amount:
          type: number
        transactionType:
          type: string
        paymentMethod:
          type: string
        transactionStatus:
          type: string
        direction:
          type: string
        referenceType:
          type: string
        referenceId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
    Trip:
      type: object
      properties:
        tripId:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        originCity:
          type: string
        destinationCity:
          type: string
        departureTime:
          type: string
          format: date-time
        availableSeats:
          type: integer
        pricePerSeat:
          type: number
        tripStatus:
          type: string
    Booking:
      type: object
      properties:
        bookingId:
          type: string
          format: uuid
        tripId:
          type: string
          format: uuid
        passengerId:
          type: string
          format: uuid
        seatNumber:
          type: integer
        bookingStatus:
          type: string
        amount:
          type: number
        paymentTransactionId:
          type: string
          format: uuid
    Package:
      type: object
      properties:
        packageId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        receiverId:
          type: string
          format: uuid
          nullable: true
        tripId:
          type: string
          format: uuid
          nullable: true
        packageStatus:
          type: string
        packageCode:
          type: string
        feeAmount:
          type: number
